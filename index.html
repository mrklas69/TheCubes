<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TheCubes</title>
  <style>
    /* Celá stránka = canvas; HUD se překládá přes něj */
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
                 font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    canvas#scene { display: block; width: 100vw; height: 100vh; }

    /* HUD = malý nenápadný panel v levém horním rohu */
    #hud {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: none;
    }
    #hud .label { opacity: 0.7; margin-right: 4px; }
    /* COUNTER řádky (dynamicky přidané divy) — lehký rozestup mezi řádky */
    #hud > div { margin-top: 2px; }

    /* Perf HUD — pravý horní roh, vizuálně izomorfní s `#hud` (vlevo).
       Sez. 28: `renderer.info` (draw calls / triangles / geometries / materials)
       throttle 1×/s v animate(). Diagnostický overlay, ne production UI. */
    #perfhud {
      position: fixed; top: 10px; right: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: none;
      line-height: 1.45;
    }
    #perfhud .label { opacity: 0.55; margin-right: 4px; }
    #perfhud .val { color: #66ccdd; }  /* tyrkysový akcent shodný s terrainctrl */

    /* Infotip = hover panel s atributy instance pod kurzorem.
       Default skrytý; JS ho pozicuje a zobrazuje. */
    #tooltip {
      position: fixed;
      display: none;
      max-width: 320px;
      background: rgba(20, 20, 35, 0.94);
      color: #eee;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #tooltip .tt-header {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ff8066;  /* coral akcent, viz DD-07 paleta */
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    #tooltip .tt-row { display: flex; gap: 6px; line-height: 1.35; }
    #tooltip .tt-key { opacity: 0.65; min-width: 80px; }
    #tooltip .tt-val { flex: 1; word-break: break-word; }

    /* Terrain control panel — pravý dolní roh, ovládací prvky generátoru.
       pointer-events: auto override nad globálním pointer-events: none HUDu. */
    #terrainctrl {
      position: fixed; bottom: 10px; right: 10px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: auto;
      min-width: 240px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #terrainctrl h3 {
      margin: 0 0 8px 0;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff8066;  /* coral akcent shodný s infotipem */
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 4px;
    }
    #terrainctrl .tc-section { margin-top: 8px; }
    #terrainctrl .tc-section > .tc-label {
      opacity: 0.55; font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    #terrainctrl .tc-row {
      display: grid;
      grid-template-columns: 56px 1fr 52px;
      align-items: center;
      gap: 6px;
      margin: 2px 0;
    }
    #terrainctrl .tc-key { opacity: 0.7; }
    #terrainctrl .tc-val { text-align: right; opacity: 0.9; }
    #terrainctrl input[type="range"] {
      width: 100%;
      accent-color: #66ccdd;  /* tyrkysový akcent — projektová konvence */
    }
    #terrainctrl input[type="number"] {
      width: 70px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 4px;
      color: #fff;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    /* Settings panel — levý dolní roh. Izomorfně s `#terrainctrl` (stejný
       transparent black, coral akcent header, tyrkysový accent input). */
    #settings {
      position: fixed; bottom: 10px; left: 10px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      user-select: none;
      pointer-events: auto;
      min-width: 140px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #settings h3 {
      margin: 0 0 8px 0;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff8066;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 4px;
    }
    #settings label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      margin: 4px 0;
    }
    #settings input[type="checkbox"] {
      accent-color: #66ccdd;
    }
    /* Slider řádek — label nad inputem, hodnota vpravo v labelu (DD-38 WORLD).
       Izomorfně s `#terrainctrl .tc-row` (label/value/slider triáda),
       jen kompaktnější (settings panel je úzký). */
    #settings .slider-row {
      margin: 6px 0 2px 0;
    }
    #settings .slider-row label {
      display: flex; justify-content: space-between;
      cursor: default; margin: 0; font-size: 12px; opacity: 0.85;
    }
    #settings .slider-row label span {
      opacity: 0.7; font-variant-numeric: tabular-nums;
    }
    #settings input[type="range"] {
      width: 100%;
      accent-color: #66ccdd;
    }
  </style>

  <!-- Import map: mapuje holé názvy ("three", "three/addons/...") na CDN URL.
       Díky tomu můžeme v JS souborech psát `import * as THREE from "three"`
       bez build stepu (žádný npm / Vite). -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <span class="label">TIME:</span><span id="time">0</span>
  </div>
  <!-- Perf HUD (sez. 28 diagnostic). FPS = 1000/dt průměr přes vteřinu, calls/tri
       = `renderer.info.render`, geom/mat = `renderer.info.memory`. -->
  <div id="perfhud">
    <div><span class="label">FPS:</span><span class="val" id="ph-fps">—</span></div>
    <div><span class="label">calls:</span><span class="val" id="ph-calls">—</span></div>
    <div><span class="label">tri:</span><span class="val" id="ph-tri">—</span></div>
    <div><span class="label">geom:</span><span class="val" id="ph-geom">—</span></div>
    <div><span class="label">mat:</span><span class="val" id="ph-mat">—</span></div>
  </div>
  <div id="tooltip"></div>

  <!-- Terrain control panel (DD-32 Fáze 3, sez. 26).
       Slidery: size X/Z (3..30), relief (0..10), 4 surface biomy (auto-normalize),
       seed (number). Trigger regenerace: `change` event (rozhodnutí sez. 26 —
       ne `input`/debounce/button). `input` aktualizuje jen readout. -->
  <div id="terrainctrl">
    <h3>Terrain generator</h3>

    <div class="tc-section">
      <div class="tc-label">Size</div>
      <div class="tc-row">
        <span class="tc-key">X</span>
        <input type="range" id="tc-size-x" min="3" max="100" step="1" value="10">
        <span class="tc-val" id="tc-size-x-val">10</span>
      </div>
      <div class="tc-row">
        <span class="tc-key">Z</span>
        <input type="range" id="tc-size-z" min="3" max="100" step="1" value="10">
        <span class="tc-val" id="tc-size-z-val">10</span>
      </div>
    </div>

    <div class="tc-section">
      <div class="tc-label">Relief</div>
      <div class="tc-row">
        <span class="tc-key">0–10</span>
        <input type="range" id="tc-relief" min="0" max="10" step="1" value="3" title="Rolling">
        <span class="tc-val" id="tc-relief-val">3</span>
      </div>
    </div>

    <div class="tc-section">
      <div class="tc-label">Surfaces (auto-normalize)</div>
      <div class="tc-row">
        <span class="tc-key">grass</span>
        <input type="range" id="tc-surf-grass" min="0" max="1" step="0.01" value="0.80" data-surf="grass">
        <span class="tc-val" id="tc-surf-grass-val">0.80</span>
      </div>
      <div class="tc-row">
        <span class="tc-key">stone</span>
        <input type="range" id="tc-surf-stone" min="0" max="1" step="0.01" value="0.10" data-surf="stone">
        <span class="tc-val" id="tc-surf-stone-val">0.10</span>
      </div>
      <div class="tc-row">
        <span class="tc-key">sand</span>
        <input type="range" id="tc-surf-sand" min="0" max="1" step="0.01" value="0.05" data-surf="sand">
        <span class="tc-val" id="tc-surf-sand-val">0.05</span>
      </div>
      <div class="tc-row">
        <span class="tc-key">water</span>
        <input type="range" id="tc-surf-water" min="0" max="1" step="0.01" value="0.05" data-surf="water">
        <span class="tc-val" id="tc-surf-water-val">0.05</span>
      </div>
    </div>

    <div class="tc-section">
      <div class="tc-label">Seed</div>
      <div class="tc-row">
        <span class="tc-key">int</span>
        <span></span>
        <input type="number" id="tc-seed" value="42" step="1">
      </div>
    </div>
  </div>

  <!-- Settings panel (sez. 31, rozšířen sez. 32) — vizuální toggle + WORLD
       atributy (DD-38). Wire na `window.settings.setXxx(...)` (exposed v
       main.js). Defaulty matchnou inicializaci scény. -->
  <div id="settings">
    <h3>Settings</h3>
    <label><input type="checkbox" id="set-dof" checked> DOF (rozostření)</label>
    <label><input type="checkbox" id="set-fog" checked> Fog (mlha)</label>
    <label><input type="checkbox" id="set-sun" checked> Slunce</label>
    <div class="slider-row">
      <label for="set-day">DAY <span id="set-day-val">0.25</span></label>
      <input type="range" id="set-day" min="0" max="0.999" step="0.01" value="0.25">
    </div>
    <div class="slider-row">
      <label for="set-day-speed">DAY_SPEED <span id="set-day-speed-val">0.000</span></label>
      <input type="range" id="set-day-speed" min="0" max="0.1" step="0.001" value="0">
    </div>
  </div>

  <canvas id="scene"></canvas>

  <!-- type="module" umožňuje ES modulové `import` / `export` v prohlížeči.
       Pozor: vyžaduje HTTP server (ne `file://`) kvůli CORS. -->
  <script type="module" src="src/main.js"></script>

  <!-- Terrain panel controller — wire `#terrainctrl` slidery na
       `window.regenerateScene` (exposed v main.js). `input` event = live
       readout + surface auto-normalize; `change` event = regen scény.
       Inline script po main.js (defer module): v okamžiku spuštění je
       `window.regenerateScene` definovaný. -->
  <script>
    (() => {
      const RELIEF_NAMES = [
        "Flat", "Level", "Gently undulating", "Rolling", "Hilly",
        "Uneven", "Rugged", "Craggy", "Mountainous", "Heavily dissected", "Alpine",
      ];
      const SURFACE_KINDS = ["grass", "stone", "sand", "water"];

      const $ = (id) => document.getElementById(id);
      const sizeX  = $("tc-size-x"),  sizeXVal  = $("tc-size-x-val");
      const sizeZ  = $("tc-size-z"),  sizeZVal  = $("tc-size-z-val");
      const relief = $("tc-relief"),  reliefVal = $("tc-relief-val");
      const seed   = $("tc-seed");
      const surfInputs = Object.fromEntries(
        SURFACE_KINDS.map((k) => [k, $(`tc-surf-${k}`)]),
      );
      const surfVals = Object.fromEntries(
        SURFACE_KINDS.map((k) => [k, $(`tc-surf-${k}-val`)]),
      );

      // Sestaví aktuální parametry z UI stavu. Volaný z `change` handleru.
      function readParams() {
        const surfaces = {};
        SURFACE_KINDS.forEach((k) => { surfaces[k] = parseFloat(surfInputs[k].value); });
        return {
          size:     [parseInt(sizeX.value, 10), parseInt(sizeZ.value, 10)],
          relief:   parseInt(relief.value, 10),
          surfaces,
          seed:     parseInt(seed.value, 10),
        };
      }

      // Re-normalizace surface sliderů na sum = 1.0 po pohybu jednoho slideru.
      // Strategie: scale ostatních proporčně, aby drželi původní vzájemné poměry.
      // Edge case 1: změněný = 1.0 → ostatní vyfouknou na 0. Edge case 2: ostatní
      // mají sum = 0 (vše 0) → rozděl `remaining` rovnoměrně.
      function normalizeSurfaces(changedKind) {
        const changedVal = parseFloat(surfInputs[changedKind].value);
        const otherKinds = SURFACE_KINDS.filter((k) => k !== changedKind);
        const otherSum   = otherKinds.reduce(
          (s, k) => s + parseFloat(surfInputs[k].value), 0,
        );
        const remaining  = Math.max(0, 1 - changedVal);

        if (otherSum < 0.0001) {
          // Všechny ostatní jsou 0 — rozděl remaining rovnoměrně.
          const share = remaining / otherKinds.length;
          otherKinds.forEach((k) => { surfInputs[k].value = share.toFixed(2); });
        } else {
          const scale = remaining / otherSum;
          otherKinds.forEach((k) => {
            const newVal = parseFloat(surfInputs[k].value) * scale;
            surfInputs[k].value = newVal.toFixed(2);
          });
        }
        // Update readouts u ostatních (změněného aktualizuje vlastní `input` handler).
        otherKinds.forEach((k) => {
          surfVals[k].textContent = parseFloat(surfInputs[k].value).toFixed(2);
        });
      }

      // `input` (live při dragu) — jen readout + auto-normalize. NEspouští regen.
      sizeX.addEventListener("input",  () => { sizeXVal.textContent  = sizeX.value; });
      sizeZ.addEventListener("input",  () => { sizeZVal.textContent  = sizeZ.value; });
      relief.addEventListener("input", () => {
        reliefVal.textContent = relief.value;
        // RELIEF_NAMES popisek je v `title` atributu — browser ho ukáže jako
        // native tooltip při hover na slider. Sync per `input` event.
        relief.title = RELIEF_NAMES[parseInt(relief.value, 10)];
      });
      SURFACE_KINDS.forEach((k) => {
        surfInputs[k].addEventListener("input", () => {
          surfVals[k].textContent = parseFloat(surfInputs[k].value).toFixed(2);
          normalizeSurfaces(k);
        });
      });

      // `change` (po dotažení slideru / blur na number) — spustí regen.
      // Programmatic update value (`surfInputs[k].value = ...`) `change` event
      // NEemituje — auto-normalize je tedy bezpečný před cyklem (žádný feedback loop).
      const onChange = () => {
        if (typeof window.regenerateScene === "function") {
          window.regenerateScene(readParams());
        }
      };
      [sizeX, sizeZ, relief, seed].forEach((el) => el.addEventListener("change", onChange));
      SURFACE_KINDS.forEach((k) => surfInputs[k].addEventListener("change", onChange));
    })();
  </script>

  <!-- Settings panel controller — wire toggle checkboxy + DAY/DAY_SPEED slidery
       na `window.settings` API (DOF/Fog/Sun/Day/DaySpeed) exposed v `src/main.js`.
       Slidery: `input` event = live (žádné regeneration jako v terrainctrl). -->
  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      $("set-dof").addEventListener("change", (e) => window.settings.setDOF(e.target.checked));
      $("set-fog").addEventListener("change", (e) => window.settings.setFog(e.target.checked));
      $("set-sun").addEventListener("change", (e) => window.settings.setSun(e.target.checked));
      const dayInput   = $("set-day");
      const dayVal     = $("set-day-val");
      const speedInput = $("set-day-speed");
      const speedVal   = $("set-day-speed-val");
      dayInput.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        window.settings.setDay(v);
        dayVal.textContent = v.toFixed(2);
      });
      speedInput.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        window.settings.setDaySpeed(v);
        speedVal.textContent = v.toFixed(3);
      });
    })();
  </script>
</body>
</html>
