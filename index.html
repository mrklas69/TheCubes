<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TheCubes</title>
  <style>
    /* Celá stránka = canvas; HUD se překládá přes něj */
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
                 font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    canvas#scene { display: block; width: 100vw; height: 100vh; }

    /* HUD = malý nenápadný panel v levém horním rohu */
    #hud {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: none;
    }
    #hud .label { opacity: 0.7; margin-right: 4px; }
    /* COUNTER řádky (dynamicky přidané divy) — lehký rozestup mezi řádky */
    #hud > div { margin-top: 2px; }
    /* Resource panel (DD-31, sez. 21) — 6 čítačů surovin pod TIME řádkem.
       Jeden řádek per surovina: label vlevo, hodnota vpravo, tabular-nums. */
    #resources {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 13px;
      min-width: 140px;
    }
    #resources .res-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 1px;
    }
    #resources .res-label { opacity: 0.7; }
    #resources .res-val { font-weight: 600; }

    /* Sim control panel (DD-31, sez. 22 fáze B) — slider pro world.TIME_SCALE.
       Vlastní pointer-events: auto, aby slider chytal myš (#hud má none). */
    #simctrl {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 12px;
      pointer-events: auto;
    }
    #simctrl .sim-row { display: flex; justify-content: space-between; gap: 8px; }
    #simctrl .sim-label { opacity: 0.7; }
    #simctrl .sim-val { font-weight: 600; min-width: 32px; text-align: right; }
    #simctrl input[type="range"] {
      width: 100%;
      margin-top: 3px;
      accent-color: #66ccdd;
      cursor: pointer;
    }

    /* Event log = ticker v levém dolním rohu (DD-31, Voidspan-derived bottom bar
       inspirace). Monospace, severity-colored verb. */
    #eventlog {
      position: fixed; bottom: 10px; left: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #ddd;
      padding: 6px 12px;
      border-radius: 6px;
      font: 12px/1.5 ui-monospace, "SF Mono", Consolas, monospace;
      user-select: none;
      pointer-events: none;
      min-width: 320px;
      max-width: 60vw;
      white-space: pre;
    }
    #eventlog .evt-line { display: block; }
    #eventlog .evt-prod { color: #88dd88; }   /* zelená = produkce */
    #eventlog .evt-drn  { color: #c8c8c8; }   /* neutrální = čerpání inputu */
    #eventlog .evt-paus { color: #ddcc66; }   /* amber = gate spadla */
    #eventlog .evt-rsum { color: #66ccdd; }   /* cyan = gate uvolněna */


    /* Infotip = hover panel s atributy instance pod kurzorem.
       Default skrytý; JS ho pozicuje a zobrazuje. */
    #tooltip {
      position: fixed;
      display: none;
      max-width: 320px;
      background: rgba(20, 20, 35, 0.94);
      color: #eee;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #tooltip .tt-header {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ff8066;  /* coral akcent, viz DD-07 paleta */
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    #tooltip .tt-row { display: flex; gap: 6px; line-height: 1.35; }
    #tooltip .tt-key { opacity: 0.65; min-width: 80px; }
    #tooltip .tt-val { flex: 1; word-break: break-word; }
  </style>

  <!-- Import map: mapuje holé názvy ("three", "three/addons/...") na CDN URL.
       Díky tomu můžeme v JS souborech psát `import * as THREE from "three"`
       bez build stepu (žádný npm / Vite). -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <span class="label">TIME:</span><span id="time">0</span>
    <!-- Resource panel — 6 čítačů (DD-31). Engine `aggregateResources()`
         přepisuje .res-val text každý frame. -->
    <div id="resources">
      <div class="res-row"><span class="res-label">Klády</span><span class="res-val" id="res-logs">0</span></div>
      <div class="res-row"><span class="res-label">Prkna</span><span class="res-val" id="res-planks">0</span></div>
      <div class="res-row"><span class="res-label">Kámen</span><span class="res-val" id="res-stone">0</span></div>
      <div class="res-row"><span class="res-label">Štěrk</span><span class="res-val" id="res-gravel">0</span></div>
      <div class="res-row"><span class="res-label">Voda</span><span class="res-val" id="res-water">0</span></div>
      <div class="res-row"><span class="res-label">Uhlí</span><span class="res-val" id="res-coal">0</span></div>
    </div>
    <div id="simctrl">
      <div class="sim-row">
        <span class="sim-label">Rychlost simulace</span>
        <span class="sim-val" id="time-scale-val">1.0×</span>
      </div>
      <input type="range" id="time-scale-slider" min="0" max="3" step="0.1" value="1">
    </div>
  </div>
  <div id="tooltip"></div>
  <div id="eventlog"></div>
  <canvas id="scene"></canvas>

  <!-- type="module" umožňuje ES modulové `import` / `export` v prohlížeči.
       Pozor: vyžaduje HTTP server (ne `file://`) kvůli CORS. -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
