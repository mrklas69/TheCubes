<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TheCubes</title>
  <style>
    /* Celá stránka = canvas; HUD se překládá přes něj */
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
                 font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    canvas#scene { display: block; width: 100vw; height: 100vh; }

    /* HUD = malý nenápadný panel v levém horním rohu */
    #hud {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: none;
    }
    #hud .label { opacity: 0.7; margin-right: 4px; }
    /* COUNTER řádky (dynamicky přidané divy) — lehký rozestup mezi řádky */
    #hud > div { margin-top: 2px; }

    /* Perf HUD — pravý horní roh, vizuálně izomorfní s `#hud` (vlevo).
       Sez. 28: `renderer.info` (draw calls / triangles / geometries / materials)
       throttle 1×/s v animate(). Diagnostický overlay, ne production UI. */
    #perfhud {
      position: fixed; top: 10px; right: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: none;
      line-height: 1.45;
    }
    #perfhud .label { opacity: 0.55; margin-right: 4px; }
    #perfhud .val { color: #66ccdd; }  /* tyrkysový akcent shodný s terrainctrl */

    /* Infotip = hover panel s atributy instance pod kurzorem.
       Default skrytý; JS ho pozicuje a zobrazuje. */
    #tooltip {
      position: fixed;
      display: none;
      max-width: 320px;
      background: rgba(20, 20, 35, 0.94);
      color: #eee;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #tooltip .tt-header {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ff8066;  /* coral akcent, viz DD-07 paleta */
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    #tooltip .tt-row { display: flex; gap: 6px; line-height: 1.35; }
    #tooltip .tt-key { opacity: 0.65; min-width: 80px; }
    #tooltip .tt-val { flex: 1; word-break: break-word; }

    /* Terrain control panel — pravý dolní roh, ovládací prvky generátoru.
       pointer-events: auto override nad globálním pointer-events: none HUDu. */
    #terrainctrl {
      position: fixed; bottom: 10px; right: 10px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: auto;
      min-width: 240px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #terrainctrl h3 {
      margin: 0 0 8px 0;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff8066;  /* coral akcent shodný s infotipem */
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 4px;
    }
    #terrainctrl .tc-section { margin-top: 8px; }
    #terrainctrl .tc-section > .tc-label {
      opacity: 0.55; font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    #terrainctrl .tc-row {
      display: grid;
      grid-template-columns: 56px 1fr 52px;
      align-items: center;
      gap: 6px;
      margin: 2px 0;
    }
    #terrainctrl .tc-key { opacity: 0.7; }
    #terrainctrl .tc-val { text-align: right; opacity: 0.9; }
    #terrainctrl input[type="range"] {
      width: 100%;
      accent-color: #66ccdd;  /* tyrkysový akcent — projektová konvence */
    }
    #terrainctrl input[type="number"] {
      width: 70px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 4px;
      color: #fff;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    /* Climate sekce (G2, sez. 35) — širší val column pro slovní enum hodnoty
       (Tropický/Subtropický/...). Biome readout = derivovaný atribut, tyrkysový
       akcent symbolizuje read-only (= odvozeno z LATITUDE × HUMIDITY). */
    #terrainctrl .climate-row { grid-template-columns: 56px 1fr 88px; }
    #terrainctrl .tc-biome {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.85;
      color: #66ccdd;
    }

    /* Settings panel — levý dolní roh. Izomorfně s `#terrainctrl` (stejný
       transparent black, coral akcent header, tyrkysový accent input). */
    #settings {
      position: fixed; bottom: 10px; left: 10px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      user-select: none;
      pointer-events: auto;
      min-width: 140px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #settings h3 {
      margin: 0 0 8px 0;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff8066;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 4px;
    }
    #settings label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      margin: 4px 0;
    }
    #settings input[type="checkbox"] {
      accent-color: #66ccdd;
    }
    /* Slider řádek — label nad inputem, hodnota vpravo v labelu (DD-38 WORLD).
       Izomorfně s `#terrainctrl .tc-row` (label/value/slider triáda),
       jen kompaktnější (settings panel je úzký). */
    #settings .slider-row {
      margin: 6px 0 2px 0;
    }
    #settings .slider-row label {
      display: flex; justify-content: space-between;
      cursor: default; margin: 0; font-size: 12px; opacity: 0.85;
    }
    #settings .slider-row label span {
      opacity: 0.7; font-variant-numeric: tabular-nums;
    }
    #settings input[type="range"] {
      width: 100%;
      accent-color: #66ccdd;
    }
  </style>

  <!-- Import map: mapuje holé názvy ("three", "three/addons/...") na CDN URL.
       Díky tomu můžeme v JS souborech psát `import * as THREE from "three"`
       bez build stepu (žádný npm / Vite). -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <span class="label">TIME:</span><span id="time">0</span>
  </div>
  <!-- Perf HUD (sez. 28 diagnostic). FPS = 1000/dt průměr přes vteřinu, calls/tri
       = `renderer.info.render`, geom/mat = `renderer.info.memory`. -->
  <div id="perfhud">
    <div><span class="label">FPS:</span><span class="val" id="ph-fps">—</span></div>
    <div><span class="label">calls:</span><span class="val" id="ph-calls">—</span></div>
    <div><span class="label">tri:</span><span class="val" id="ph-tri">—</span></div>
    <div><span class="label">geom:</span><span class="val" id="ph-geom">—</span></div>
    <div><span class="label">mat:</span><span class="val" id="ph-mat">—</span></div>
  </div>
  <div id="tooltip"></div>

  <!-- Terrain control panel (DD-32 Fáze 3, sez. 26).
       Slidery: size X/Z (3..30), relief (0..10), 4 surface biomy (auto-normalize),
       seed (number). Trigger regenerace: `change` event (rozhodnutí sez. 26 —
       ne `input`/debounce/button). `input` aktualizuje jen readout. -->
  <div id="terrainctrl">
    <h3>Terrain generator</h3>

    <div class="tc-section">
      <div class="tc-label">Size</div>
      <div class="tc-row">
        <span class="tc-key">X</span>
        <input type="range" id="tc-size-x" min="3" max="100" step="1" value="10">
        <span class="tc-val" id="tc-size-x-val">10</span>
      </div>
      <div class="tc-row">
        <span class="tc-key">Z</span>
        <input type="range" id="tc-size-z" min="3" max="100" step="1" value="10">
        <span class="tc-val" id="tc-size-z-val">10</span>
      </div>
    </div>

    <div class="tc-section">
      <div class="tc-label">Relief</div>
      <div class="tc-row">
        <span class="tc-key">0–10</span>
        <input type="range" id="tc-relief" min="0" max="10" step="1" value="3" title="Rolling">
        <span class="tc-val" id="tc-relief-val">3</span>
      </div>
    </div>

    <!-- Surfaces sekce: smazána v G3 (sez. 36, DD-44). Surface mix je
         driver-derived z Climate (LATITUDE × HUMIDITY) — viz BIOME_SURFACES
         v `src/terrain.js`. Debug surface mix přes konzoli:
         `window.regenerateScene({ ...defaults, surfaces: {...} })`. -->

    <div class="tc-section">
      <div class="tc-label">Seed</div>
      <div class="tc-row">
        <span class="tc-key">int</span>
        <span></span>
        <input type="number" id="tc-seed" value="42" step="1">
      </div>
    </div>

    <!-- Climate sekce (G2 sez. 35 + G3 sez. 36 DD-44) — WORLD atributy
         LATITUDE × HUMIDITY (4×3 biome matice). Konzumenti:
           — sun tilt fce LATITUDE (per-frame v updateSun()) ;
           — biome name readout (display, BIOME_NAMES) ;
           — surface mix driver (G3, BIOME_SURFACES → generateTerrain).
         `change` event Climate slideru trigger regen scény. -->
    <div class="tc-section">
      <div class="tc-label">Climate</div>
      <div class="tc-row climate-row">
        <span class="tc-key">pásmo</span>
        <input type="range" id="tc-latitude" min="0" max="3" step="1" value="2">
        <span class="tc-val" id="tc-latitude-val">Mírný</span>
      </div>
      <div class="tc-row climate-row">
        <span class="tc-key">vlhkost</span>
        <input type="range" id="tc-humidity" min="0" max="2" step="1" value="1">
        <span class="tc-val" id="tc-humidity-val">Středně</span>
      </div>
      <div class="tc-biome">► biome: <span id="tc-biome-val">Step / Prérie</span></div>
    </div>
  </div>

  <!-- Settings panel (sez. 31, rozšířen sez. 32) — vizuální toggle + WORLD
       atributy (DD-38). Wire na `window.settings.setXxx(...)` (exposed v
       main.js). Defaulty matchnou inicializaci scény. -->
  <div id="settings">
    <h3>Settings</h3>
    <label><input type="checkbox" id="set-dof" checked> DOF (rozostření)</label>
    <label><input type="checkbox" id="set-fog" checked> Fog (mlha)</label>
    <label><input type="checkbox" id="set-sun" checked> Slunce</label>
    <div class="slider-row">
      <label for="set-day">DAY <span id="set-day-val">0.50</span></label>
      <input type="range" id="set-day" min="0" max="0.999" step="0.01" value="0.5">
    </div>
    <div class="slider-row">
      <label for="set-day-speed">DAY_SPEED <span id="set-day-speed-val">0.000</span></label>
      <input type="range" id="set-day-speed" min="0" max="0.1" step="0.001" value="0">
    </div>
  </div>

  <canvas id="scene"></canvas>

  <!-- type="module" umožňuje ES modulové `import` / `export` v prohlížeči.
       Pozor: vyžaduje HTTP server (ne `file://`) kvůli CORS. -->
  <script type="module" src="src/main.js"></script>

  <!-- Terrain panel controller — wire `#terrainctrl` slidery na
       `window.regenerateScene` (exposed v main.js). `input` event = live
       readout; `change` event = regen scény. Surfaces jsou driver-derived
       z Climate (G3, DD-44) — žádný surface slider.
       Inline script po main.js (defer module): v okamžiku spuštění je
       `window.regenerateScene` definovaný. -->
  <script>
    (() => {
      const RELIEF_NAMES = [
        "Flat", "Level", "Gently undulating", "Rolling", "Hilly",
        "Uneven", "Rugged", "Craggy", "Mountainous", "Heavily dissected", "Alpine",
      ];

      // Climate enum + display jména. Sloučeno z dřívější Climate sekce IIFE
      // (G3, sez. 36) protože `readParams()` níž potřebuje LATITUDE_KEYS /
      // HUMIDITY_KEYS pro `surfacesForBiome` lookup.
      const LATITUDE_KEYS  = ["tropical", "subtropical", "temperate", "polar"];
      const LATITUDE_NAMES = ["Tropický", "Subtropický", "Mírný", "Polární"];
      // HUMIDITY slider orient: vlevo Sucho, vpravo Vlhko (sez. 36 user UX
       // preference — intuice "vpravo = víc"). BIOME_SURFACES/BIOME_NAMES
       // klíče zůstávají "wet"/"mid"/"dry" (sémantika klimatu, ne pozice).
      const HUMIDITY_KEYS  = ["dry", "mid", "wet"];
      const HUMIDITY_NAMES = ["Sucho", "Středně", "Vlhko"];

      const $ = (id) => document.getElementById(id);
      const sizeX  = $("tc-size-x"),  sizeXVal  = $("tc-size-x-val");
      const sizeZ  = $("tc-size-z"),  sizeZVal  = $("tc-size-z-val");
      const relief = $("tc-relief"),  reliefVal = $("tc-relief-val");
      const seed   = $("tc-seed");
      const lat      = $("tc-latitude"), latVal   = $("tc-latitude-val");
      const hum      = $("tc-humidity"), humVal   = $("tc-humidity-val");
      const biomeVal = $("tc-biome-val");

      // Sestaví aktuální parametry z UI stavu. Volaný z `change` handleru.
      // G3 (sez. 36, DD-44): `surfaces` je driver-derived z aktuálních
      // Climate sliderů přes `window.surfacesForBiome(lat, hum)` (lookup do
      // `BIOME_SURFACES` v terrain.js, fallback temperate.mid při neznámu).
      function readParams() {
        const latKey = LATITUDE_KEYS[parseInt(lat.value, 10)];
        const humKey = HUMIDITY_KEYS[parseInt(hum.value, 10)];
        const surfaces = window.surfacesForBiome?.(latKey, humKey)
                      ?? { grass: 0.65, stone: 0.20, sand: 0.05, water: 0.10 };  // fallback = temperate.mid
        return {
          size:     [parseInt(sizeX.value, 10), parseInt(sizeZ.value, 10)],
          relief:   parseInt(relief.value, 10),
          surfaces,
          seed:     parseInt(seed.value, 10),
        };
      }

      // G1 (sez. 35) — dynamický clamp `#tc-relief` slider `max` dle MIN(sx, sz).
      // Mapa 10×10 nedává proporční smysl pro alpine reliéf (vertikální stěny
      // dominují celé šířce). Helper `window.maxReliefForSize` (exposed v main.js
      // z `src/terrain.js`) vrací max reliefIdx, který má pro daný size smysl.
      // Pokud aktuální `relief.value` přesahuje nový max, sníží ji + sync readout.
      // Programmatic value set `change` event NEemituje — žádný regen feedback loop.
      function updateReliefSliderMax() {
        const sx = parseInt(sizeX.value, 10);
        const sz = parseInt(sizeZ.value, 10);
        const newMax = window.maxReliefForSize?.(sx, sz) ?? 10;
        relief.max = String(newMax);
        if (parseInt(relief.value, 10) > newMax) {
          relief.value = String(newMax);
          reliefVal.textContent = relief.value;
          relief.title = RELIEF_NAMES[newMax];
        }
      }

      // `input` (live při dragu) — jen readout. NEspouští regen.
      sizeX.addEventListener("input",  () => { sizeXVal.textContent  = sizeX.value; updateReliefSliderMax(); });
      sizeZ.addEventListener("input",  () => { sizeZVal.textContent  = sizeZ.value; updateReliefSliderMax(); });
      relief.addEventListener("input", () => {
        reliefVal.textContent = relief.value;
        // RELIEF_NAMES popisek je v `title` atributu — browser ho ukáže jako
        // native tooltip při hover na slider. Sync per `input` event.
        relief.title = RELIEF_NAMES[parseInt(relief.value, 10)];
      });

      // `change` (po dotažení slideru / blur na number) — spustí regen.
      const onChange = () => {
        if (typeof window.regenerateScene === "function") {
          window.regenerateScene(readParams());
        }
      };
      [sizeX, sizeZ, relief, seed].forEach((el) => el.addEventListener("change", onChange));

      // Init — sync `relief.max` s defaultním size 10×10 (= relief 0..3).
      // `defer` na `<script type="module">` (main.js) garantuje, že
      // `window.maxReliefForSize` je v okamžiku tohoto IIFE běhu definován.
      updateReliefSliderMax();

      // === Climate (G2 sez. 35 + G3 sez. 36 DD-44) ===
      // `input` event mutuje WORLD atributy (per-frame sun tilt + biome readout).
      // `change` event triggeruje regen (driver-derived surface mix).
      // Konstanty (LATITUDE_KEYS/NAMES, HUMIDITY_KEYS/NAMES) + DOM refs deklarované
      // nahoře v IIFE — readParams() je potřebuje pro `surfacesForBiome` lookup.

      // Biome name readout = derivovaný z aktuální LATITUDE × HUMIDITY combo.
      // BIOME_NAMES tabulka v `src/terrain.js`, exposed jako `window.BIOME_NAMES`.
      function updateBiomeReadout() {
        const latKey = LATITUDE_KEYS[parseInt(lat.value, 10)];
        const humKey = HUMIDITY_KEYS[parseInt(hum.value, 10)];
        biomeVal.textContent = window.BIOME_NAMES?.[latKey]?.[humKey] ?? "—";
      }

      lat.addEventListener("input", () => {
        const idx = parseInt(lat.value, 10);
        latVal.textContent = LATITUDE_NAMES[idx];
        window.settings.setLatitude(LATITUDE_KEYS[idx]);
        updateBiomeReadout();
      });
      hum.addEventListener("input", () => {
        const idx = parseInt(hum.value, 10);
        humVal.textContent = HUMIDITY_NAMES[idx];
        window.settings.setHumidity(HUMIDITY_KEYS[idx]);
        updateBiomeReadout();
      });

      // G3 (sez. 36) — regen na `change` (po dotažení slideru). Surface mix
      // se přepočítá z aktuálního Climate stavu (BIOME_SURFACES lookup).
      lat.addEventListener("change", onChange);
      hum.addEventListener("change", onChange);

      // Init readout (default LATITUDE=temperate idx 2, HUMIDITY=mid idx 1 →
      // biome = "Step / Prérie"). Sync HTML default `value` s WORLD constructor.
      updateBiomeReadout();
    })();
  </script>

  <!-- Settings panel controller — wire toggle checkboxy + DAY/DAY_SPEED slidery
       na `window.settings` API (DOF/Fog/Sun/Day/DaySpeed) exposed v `src/main.js`.
       Slidery: `input` event = live (žádné regeneration jako v terrainctrl). -->
  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      $("set-dof").addEventListener("change", (e) => window.settings.setDOF(e.target.checked));
      $("set-fog").addEventListener("change", (e) => window.settings.setFog(e.target.checked));
      $("set-sun").addEventListener("change", (e) => window.settings.setSun(e.target.checked));
      const dayInput   = $("set-day");
      const dayVal     = $("set-day-val");
      const speedInput = $("set-day-speed");
      const speedVal   = $("set-day-speed-val");
      dayInput.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        window.settings.setDay(v);
        dayVal.textContent = v.toFixed(2);
      });
      speedInput.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        window.settings.setDaySpeed(v);
        speedVal.textContent = v.toFixed(3);
      });
    })();
  </script>
</body>
</html>
