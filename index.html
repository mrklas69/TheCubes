<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TheCubes</title>
  <style>
    /* Celá stránka = canvas; HUD se překládá přes něj */
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
                 font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    canvas#scene { display: block; width: 100vw; height: 100vh; }

    /* HUD = malý nenápadný panel v levém horním rohu */
    #hud {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      user-select: none;
      pointer-events: none;
    }
    #hud .label { opacity: 0.7; margin-right: 4px; }
    /* COUNTER řádky (dynamicky přidané divy) — lehký rozestup mezi řádky */
    #hud > div { margin-top: 2px; }


    /* Infotip = hover panel s atributy instance pod kurzorem.
       Default skrytý; JS ho pozicuje a zobrazuje. */
    #tooltip {
      position: fixed;
      display: none;
      max-width: 320px;
      background: rgba(20, 20, 35, 0.94);
      color: #eee;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    #tooltip .tt-header {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ff8066;  /* coral akcent, viz DD-07 paleta */
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    #tooltip .tt-row { display: flex; gap: 6px; line-height: 1.35; }
    #tooltip .tt-key { opacity: 0.65; min-width: 80px; }
    #tooltip .tt-val { flex: 1; word-break: break-word; }
  </style>

  <!-- Import map: mapuje holé názvy ("three", "three/addons/...") na CDN URL.
       Díky tomu můžeme v JS souborech psát `import * as THREE from "three"`
       bez build stepu (žádný npm / Vite). -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <span class="label">TIME:</span><span id="time">0</span>
  </div>
  <div id="tooltip"></div>
  <canvas id="scene"></canvas>

  <!-- type="module" umožňuje ES modulové `import` / `export` v prohlížeči.
       Pozor: vyžaduje HTTP server (ne `file://`) kvůli CORS. -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
